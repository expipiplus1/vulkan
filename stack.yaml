resolver: lts-22.44
packages:
- .
- utils
- utils-init/vulkan-init-sdl2
- utils-init/vulkan-init-glfw
- examples
- VulkanMemoryAllocator
- openxr
- generate-new

extra-deps:
- unification-fd-0.12.0.2
# generate-new
- validation-selective-0.2.0.0
- pl-synth-0.1.0.0
- openal-ffi-0.0.2

# use ghcup, nix, setup actions
system-ghc: true
install-ghc: false

allow-newer: true

nix:
  enable: false
  packages: [vulkan-loader vulkan-headers glslang pkg-config SDL2 zlib]
